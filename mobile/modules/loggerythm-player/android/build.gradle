buildscript {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: "com.android.library"
apply plugin: "org.jetbrains.kotlin.android"

def media3Version = "1.10.1"
def workManagerVersion = "2.11.2"

android {
    namespace "top.logge.loggerythm.player"
    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        consumerProguardFiles "consumer-rules.pro"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    testOptions {
        unitTests.returnDefaultValues = true
    }
}

repositories {
    google()
    mavenCentral()
}

def hostileControllerProject = project(":loggerythm_player-hostile-controller")
def hostileControllerApk = files(
    hostileControllerProject.layout.buildDirectory.file(
        "outputs/apk/debug/loggerythm_player-hostile-controller-debug.apk",
    ),
).builtBy(":loggerythm_player-hostile-controller:assembleDebug")

dependencies {
    implementation "com.facebook.react:react-android"
    implementation "androidx.media3:media3-exoplayer:$media3Version"
    implementation "androidx.media3:media3-session:$media3Version"
    implementation "androidx.media3:media3-datasource:$media3Version"
    implementation "androidx.media3:media3-database:$media3Version"
    implementation "androidx.work:work-runtime:$workManagerVersion"

    testImplementation "junit:junit:4.13.2"
    testImplementation "org.json:json:20260522"

    androidTestImplementation "androidx.test:runner:1.7.0"
    androidTestImplementation "androidx.test.ext:junit:1.1.5"
    // Installs a genuinely separate application/UID alongside the instrumentation APK.
    // Use the final APK artifact directly so none of its already-dexed runtime JARs can be
    // mistaken for additional test-utility APKs by the Android Gradle Plugin.
    androidTestUtil hostileControllerApk
}
