name: Native Android QA

on:
  push:
    branches: [master]
    paths:
      - "mobile/**"
      - "api/app/main.py"
      - "api/app/routers/stream.py"
      - ".github/workflows/mobile-android.yml"
  pull_request:
    paths:
      - "mobile/**"
      - "api/app/main.py"
      - "api/app/routers/stream.py"
      - ".github/workflows/mobile-android.yml"
  workflow_dispatch:

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3
        with:
          # Skip the obsolete `tools` package (the setup-android default), which
          # pulls in the flaky Android Emulator download we never use for a
          # headless APK build. Gradle's AGP auto-fetches the platform and
          # build-tools it needs; licenses are pre-accepted by this action.
          packages: platform-tools

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Typecheck, lint, and unit test
        working-directory: mobile
        run: npm run check

      - name: Validate Expo dependencies and config
        working-directory: mobile
        run: npx expo-doctor

      - name: Generate native Android project
        working-directory: mobile
        env:
          CI: "true"
        run: npx expo prebuild --platform android --clean --no-install

      - name: Android lint, unit tests, and optimized standalone APK
        working-directory: mobile/android
        env:
          # This public QA artifact is deliberately test-signed. Production
          # releases can provide the ANDROID_KEYSTORE_* / ANDROID_KEY_* secrets
          # and omit this explicit fallback.
          ALLOW_DEBUG_RELEASE_SIGNING: "true"
          ANDROID_VERSION_CODE: ${{ github.run_number }}
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon \
            :app:lintRelease :app:testReleaseUnitTest :app:assembleRelease \
            -PreactNativeArchitectures=arm64-v8a \
            -PhermesEnabled=true \
            -Pandroid.enableMinifyInReleaseBuilds=true \
            -Pandroid.enableShrinkResourcesInReleaseBuilds=true

      - name: Verify standalone APK contents and Android Auto manifest
        working-directory: mobile/android
        run: |
          set -euo pipefail
          apk=app/build/outputs/apk/release/app-release.apk
          test -s "$apk"
          unzip -Z1 "$apk" > /tmp/apk-files.txt
          grep -Fxq 'assets/index.android.bundle' /tmp/apk-files.txt
          grep -q '^lib/arm64-v8a/' /tmp/apk-files.txt
          if grep -Eq '^lib/(armeabi-v7a|x86|x86_64)/' /tmp/apk-files.txt; then
            echo 'Unexpected non-arm64 native library in APK' >&2
            exit 1
          fi
          python3 - "$apk" <<'PY'
          import sys, zipfile
          with zipfile.ZipFile(sys.argv[1]) as apk_zip:
              bundle = apk_zip.read('assets/index.android.bundle')
              assert bundle[:4].hex() == 'c61fbc03', 'bundle is not Hermes bytecode'
              assert b'https://loggerythm.logge.top' in bundle, 'production server URL missing from bundle'
              assert b'10.0.2.2' not in bundle, 'emulator server URL leaked into release bundle'
          PY
          test -s app/build/outputs/mapping/release/mapping.txt
          test -s app/build/outputs/mapping/release/resources.txt
          aapt="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)/aapt"
          "$aapt" dump badging "$apk" > /tmp/badging.txt
          "$aapt" dump xmltree "$apk" AndroidManifest.xml > /tmp/manifest.txt
          "$aapt" dump resources "$apk" > /tmp/resources.txt
          grep -q "application-label:'LoggeRythm'" /tmp/badging.txt
          grep -Eq "application-icon-[0-9]+:'res/[^']+'" /tmp/badging.txt
          grep -q 'com.doublesymmetry.trackplayer.TrackPlayerPlaybackService' /tmp/manifest.txt
          grep -q 'android:foregroundServiceType' /tmp/manifest.txt
          grep -q 'com.google.android.gms.car.application' /tmp/manifest.txt
          grep -q 'android.intent.category.LAUNCHER' /tmp/manifest.txt
          grep -q 'mipmap/ic_launcher' /tmp/manifest.txt
          grep -q 'mipmap/ic_launcher_round' /tmp/manifest.txt
          grep -q 'xml/automotive_app_desc' /tmp/resources.txt
          grep -q 'mipmap/ic_launcher' /tmp/resources.txt
          grep -q 'mipmap/ic_launcher_foreground' /tmp/resources.txt
          cp "$apk" LoggeRythm-native-arm64-v8a.apk
          sha256sum LoggeRythm-native-arm64-v8a.apk

      - uses: actions/upload-artifact@v4
        with:
          name: loggerythm-native-arm64-v8a-apk
          path: mobile/android/LoggeRythm-native-arm64-v8a.apk
          if-no-files-found: error
