name: Android APK

# Builds the Capacitor APK in the cloud (no local Android toolchain needed).
# Set repo variable SPOTIFREI_URL (Settings → Secrets and variables → Actions →
# Variables) to your deployed Spotifrei URL so the app points at your server.
on:
  push:
    branches: [master]
    paths:
      - "web/**"
      - ".github/workflows/android-apk.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3

      - name: Install deps
        working-directory: web
        run: npm ci

      - name: Capacitor sync (bake server URL)
        working-directory: web
        env:
          SPOTIFREI_URL: ${{ vars.SPOTIFREI_URL }}
        run: npx cap sync android

      - name: Build debug APK
        working-directory: web/android
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: spotifrei-debug-apk
          path: web/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
