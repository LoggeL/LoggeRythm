name: API Contract

on:
  push:
    branches: [master]
    paths:
      - "api/**"
      - "mobile/src/api/generated/**"
      - ".github/workflows/api-contract.yml"
  pull_request:
    paths:
      - "api/**"
      - "mobile/src/api/generated/**"
      - ".github/workflows/api-contract.yml"
  workflow_dispatch:

jobs:
  openapi-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install API dependencies
        run: python -m pip install -r api/requirements.txt

      - name: Reject uncommitted OpenAPI drift
        working-directory: api
        run: |
          python -m app.openapi_contract check
          python -m app.android_contract check

      - name: Test OpenAPI contract tooling
        working-directory: api
        run: python -m unittest tests.test_openapi_contract tests.test_mobile_ci_contract
