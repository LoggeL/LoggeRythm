<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>SpotiFrei</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        background: #121212;
        color: #a0a0a0;
        font-family: system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      .box { padding: 2rem; }
      b { color: #eee; }
      button {
        border: 0;
        border-radius: 999px;
        background: #1ed760;
        color: #050505;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        margin-top: 1rem;
        min-height: 3rem;
        padding: 0 1.5rem;
      }
      button:focus-visible { outline: 3px solid #fff; outline-offset: 3px; }
      #status { min-height: 1.5rem; }
    </style>
  </head>
  <body>
    <!-- Fallback shown only if the configured server is unreachable. -->
    <div class="box">
      <p><b>SpotiFrei</b></p>
      <p>Server nicht erreichbar. Prüfe deine Verbindung und die SPOTIFREI_URL.</p>
      <button id="retry" type="button">Erneut versuchen</button>
      <p id="status" role="alert" aria-live="polite"></p>
    </div>
    <script>
      const retry = document.getElementById("retry");
      const status = document.getElementById("status");

      retry.addEventListener("click", () => {
        status.textContent = "Verbindung wird erneut hergestellt …";
        const getServerUrl = window.Capacitor?.getServerUrl;
        if (typeof getServerUrl !== "function") {
          const message = "Die native Serverkonfiguration ist nicht verfügbar.";
          status.textContent = message;
          throw new Error(message);
        }
        const serverUrl = getServerUrl.call(window.Capacitor);
        let parsed;
        try {
          parsed = new URL(serverUrl);
        } catch (error) {
          const message = `Ungültige native Server-URL: ${error.message}`;
          status.textContent = message;
          throw new Error(message);
        }
        if (parsed.protocol !== "https:" && parsed.protocol !== "http:") {
          const message = `Nicht unterstütztes Serverprotokoll: ${parsed.protocol}`;
          status.textContent = message;
          throw new Error(message);
        }
        window.location.replace(parsed.href);
      });
    </script>
  </body>
</html>
